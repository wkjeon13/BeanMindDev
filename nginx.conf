worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
   server_names_hash_bucket_size 64;
    server {
        listen 443 ssl;
        server_name www.beanmindcurator.com beanmindcurator.com;

        ssl_certificate     C:/nginx-1.26.3/certs/www.beanmindcurator.com-chain.pem;
        ssl_certificate_key C:/nginx-1.26.3/certs/www.beanmindcurator.com-key.pem;

        root C:/Coffee_project/homepage;
        index index.html;

        location / {
            default_type application/json;
            try_files $uri $uri/ /index.html;
        }

        location = /.well-known/apple-app-site-association {
            types {
                application/json apple-app-site-association;
            }
            default_type application/json;
        }

        location = /.well-known/assetlinks.json {
            types {
                application/json assetlinks.json;
            }
            default_type application/json;
        }

        location /api/ {
            proxy_pass http://127.0.0.1:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /uploads/ {
            proxy_pass http://127.0.0.1:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/auth/naver/callback {
            proxy_pass http://127.0.0.1:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

server {
    listen 443 ssl;
    server_name partner.beanmindcurator.com;

    ssl_certificate     C:/nginx-1.26.3/certs/partner.beanmindcurator.com-chain.pem;
    ssl_certificate_key C:/nginx-1.26.3/certs/partner.beanmindcurator.com-key.pem;

    root C:/Working/beanmind_-ai-coffee-curator/host-web/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /uploads/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}


server {
    listen 80 default_server;
    server_name beanmindcurator.com www.beanmindcurator.com 39.118.249.241 192.168.0.29 localhost;

    location /.well-known/acme-challenge/ {
        root C:/Coffee_project/homepage;
    }

    location / {
        return 301 https://www.beanmindcurator.com$request_uri;
    }
}

server {
    listen 80;
    server_name partner.beanmindcurator.com;

    location /.well-known/acme-challenge/ {
        root C:/Working/beanmind_-ai-coffee-curator/host-web;
    }

    location / {
        return 301 https://partner.beanmindcurator.com$request_uri;
    }
}

}